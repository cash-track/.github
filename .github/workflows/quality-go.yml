name: Quality (Go)

on:
  workflow_call:
    inputs:
      go-version:
        required: false
        type: string
        default: "1.26"
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
      golangci-lint-version:
        required: false
        type: string
        default: "v2.11.2"
      test-packages:
        description: "Go list pattern for the test step"
        required: false
        type: string
        default: "./..."
      cgo-enabled:
        required: false
        type: string
        default: "1"
      upload-coverage:
        required: false
        type: boolean
        default: true
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        env:
          CGO_ENABLED: ${{ inputs.cgo-enabled }}
        run: |
          go mod download
          go build -race -v ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9
        with:
          version: ${{ inputs.golangci-lint-version }}

  tests:
    name: Tests
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Test
        env:
          CGO_ENABLED: ${{ inputs.cgo-enabled }}
        run: |
          go test -race -coverprofile=coverage.txt -covermode=atomic -v ${{ inputs.test-packages }}

      - name: Upload coverage to Codecov
        if: ${{ inputs.upload-coverage }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
