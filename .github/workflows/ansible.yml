name: Ansible

on:
  workflow_call:
    inputs:
      ref:
        description: "Ref of cash-track/infra to check out"
        required: false
        type: string
        default: "main"
      playbook:
        description: "Playbook to run, relative to ansible/ directory"
        required: false
        type: string
        default: "site.yml"
      tags:
        description: "Optional --tags filter"
        required: false
        type: string
        default: ""
      limit:
        description: "Optional --limit filter"
        required: false
        type: string
        default: ""
      force_replace_reason:
        description: "Forwarded as FORCE_REPLACE_REASON env var; required when replace-droplet.yml preflight detects a stale backup"
        required: false
        type: string
        default: ""
      check_mode:
        description: "Run in --check (dry-run) mode"
        required: false
        type: boolean
        default: false
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true
      TS_AUTH_KEY:
        required: true
      SPACES_TFSTATE_ID:
        required: false
      SPACES_TFSTATE_KEY:
        required: false

concurrency:
  group: ansible-apply-prod
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: cash-track/infra
          ref: ${{ inputs.ref }}

      - name: Set up python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install ansible
        working-directory: ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.17"
          ansible-galaxy collection install -r requirements.yml

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@143a85f84a90555d121cde2ff5872e393a47ab9f  # v1

      - name: Join tailnet
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade  # v3
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      - name: Run ansible
        working-directory: ansible
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SPACES_TFSTATE_ID: ${{ secrets.SPACES_TFSTATE_ID }}
          SPACES_TFSTATE_KEY: ${{ secrets.SPACES_TFSTATE_KEY }}
          ANSIBLE_FORCE_COLOR: "1"
          FORCE_REPLACE_REASON: ${{ inputs.force_replace_reason }}
          ANSIBLE_TAGS: ${{ inputs.tags }}
          ANSIBLE_LIMIT: ${{ inputs.limit }}
          ANSIBLE_PLAYBOOK: ${{ inputs.playbook }}
        run: |
          args=()
          if [[ -n "$ANSIBLE_TAGS" ]]; then
            args+=(--tags "$ANSIBLE_TAGS")
          fi
          if [[ -n "$ANSIBLE_LIMIT" ]]; then
            args+=(--limit "$ANSIBLE_LIMIT")
          fi
          if [[ "${{ inputs.check_mode }}" == "true" ]]; then
            args+=(--check --diff)
          fi
          ansible-playbook "$ANSIBLE_PLAYBOOK" "${args[@]}"
