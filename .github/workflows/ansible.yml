name: Ansible

on:
  workflow_call:
    inputs:
      ref:
        description: "Ref of cash-track/infra to check out"
        required: false
        type: string
        default: "main"
      playbook:
        description: "Playbook to run, relative to ansible/ directory"
        required: false
        type: string
        default: "site.yml"
      tags:
        description: "Optional --tags filter"
        required: false
        type: string
        default: ""
      limit:
        description: "Optional --limit filter"
        required: false
        type: string
        default: ""
      force_replace_reason:
        description: "Forwarded as FORCE_REPLACE_REASON env var; required when replace-droplet.yml preflight detects a stale backup"
        required: false
        type: string
        default: ""
      check_mode:
        description: "Run in --check (dry-run) mode"
        required: false
        type: boolean
        default: false
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true
      TS_OAUTH_CLIENT_ID:
        required: true
      TS_OAUTH_SECRET:
        required: true
      SPACES_TFSTATE_ID:
        required: true
      SPACES_TFSTATE_KEY:
        required: true

concurrency:
  group: ansible-apply-prod
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout infra
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: cash-track/infra
          ref: ${{ inputs.ref }}

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install ansible
        working-directory: ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.17"
          ansible-galaxy collection install -r requirements.yml

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Terraform init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_TFSTATE_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_TFSTATE_KEY }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"https://ams3.digitaloceanspaces.com\"}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="use_path_style=true"

      - name: Mask Terraform outputs
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_TFSTATE_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_TFSTATE_KEY }}
        run: |
          terraform output -json | jq -r 'to_entries[] | .value.value | tostring' | while read -r val; do
            echo "::add-mask::$val"
          done

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4  # v3

      - name: Join tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8  # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cashtrack-infra

      - name: Run ansible
        working-directory: ansible
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_TFSTATE_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_TFSTATE_KEY }}
          ANSIBLE_FORCE_COLOR: "1"
          FORCE_REPLACE_REASON: ${{ inputs.force_replace_reason }}
          ANSIBLE_TAGS: ${{ inputs.tags }}
          ANSIBLE_LIMIT: ${{ inputs.limit }}
          ANSIBLE_PLAYBOOK: ${{ inputs.playbook }}
        run: |
          args=()
          if [[ -n "$ANSIBLE_TAGS" ]]; then
            args+=(--tags "$ANSIBLE_TAGS")
          fi
          if [[ -n "$ANSIBLE_LIMIT" ]]; then
            args+=(--limit "$ANSIBLE_LIMIT")
          fi
          if [[ "${{ inputs.check_mode }}" == "true" ]]; then
            args+=(--check --diff)
          fi
          ansible-playbook "$ANSIBLE_PLAYBOOK" "${args[@]}"
