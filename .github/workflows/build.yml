name: Build

on:
  workflow_call:
    inputs:
      image:
        description: "Docker repo, e.g. cashtrack/api"
        required: true
        type: string
      tag:
        description: "Image tag — used verbatim, no normalisation"
        required: true
        type: string
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      push_latest:
        description: "Also push the :latest tag"
        required: false
        type: boolean
        default: true
      build_args:
        description: "Newline-separated KEY=VALUE build args"
        required: false
        type: string
        default: ""
      attest:
        description: "Generate and push build provenance attestation"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
    outputs:
      digest:
        description: "Image digest of the pushed manifest"
        value: ${{ jobs.build.outputs.digest }}

concurrency:
  group: build-${{ inputs.image }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        if: ${{ inputs.attest }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: docker.io/${{ inputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
