name: Build

on:
  workflow_call:
    inputs:
      image:
        description: "Docker repo, e.g. cashtrack/api"
        required: true
        type: string
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      tag_rules:
        description: |
          Newline-separated docker/metadata-action tag rules. Defaults to the org
          convention: type=sha (sha-<short>) plus type=semver,pattern={{version}}
          which strips the leading v from git tags (v1.2.9 -> 1.2.9).
        required: false
        type: string
        default: |
          type=sha
          type=semver,pattern={{version}}
      flavor:
        description: "docker/metadata-action flavor rules (e.g. latest=auto)"
        required: false
        type: string
        default: "latest=auto"
      build_args:
        description: |
          Newline-separated KEY=VALUE build args. Defaults to GIT_COMMIT and
          GIT_TAG so Dockerfiles can stamp the image with provenance metadata
          (ARG GIT_COMMIT / ARG GIT_TAG). Repos whose Dockerfile does not
          reference these will simply ignore them. Override only when the
          caller needs additional args — re-specify GIT_COMMIT/GIT_TAG in
          the override if you still want them.
        required: false
        type: string
        default: |
          GIT_COMMIT=${{ github.sha }}
          GIT_TAG=${{ github.ref_name }}
      attest:
        description: "Generate and push build provenance attestation"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
    outputs:
      digest:
        description: "Image digest of the pushed manifest"
        value: ${{ jobs.build.outputs.digest }}
      version:
        description: "Primary version derived by docker/metadata-action (matches the deploy tag)"
        value: ${{ jobs.build.outputs.version }}
      tags:
        description: "Newline-separated full image:tag refs that were pushed"
        value: ${{ jobs.build.outputs.tags }}

concurrency:
  group: build-${{ inputs.image }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ inputs.image }}
          tags: ${{ inputs.tag_rules }}
          flavor: ${{ inputs.flavor }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        if: ${{ inputs.attest }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-name: docker.io/${{ inputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
