name: Build

on:
  workflow_call:
    inputs:
      image:
        description: "Docker repo, e.g. cashtrack/api"
        required: true
        type: string
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      tag_rules:
        description: |
          Newline-separated docker/metadata-action tag rules. Defaults to the org
          convention: type=sha (sha-<short>) plus type=semver,pattern={{version}}
          which strips the leading v from git tags (v1.2.9 -> 1.2.9).
        required: false
        type: string
        default: |
          type=sha
          type=semver,pattern={{version}}
      flavor:
        description: "docker/metadata-action flavor rules (e.g. latest=auto)"
        required: false
        type: string
        default: "latest=auto"
      build_args:
        description: |
          Newline-separated KEY=VALUE build args. Defaults to GIT_COMMIT and
          GIT_TAG so Dockerfiles can stamp the image with provenance metadata
          (ARG GIT_COMMIT / ARG GIT_TAG). Repos whose Dockerfile does not
          reference these will simply ignore them. Override only when the
          caller needs additional args — re-specify GIT_COMMIT/GIT_TAG in
          the override if you still want them.
        required: false
        type: string
        default: |
          GIT_COMMIT=${{ github.sha }}
          GIT_TAG=${{ github.ref_name }}
      attest:
        description: "Generate and push build provenance attestation"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
    outputs:
      digest:
        description: "Image digest of the pushed manifest"
        value: ${{ jobs.build.outputs.digest }}
      version:
        description: "Primary version derived by docker/metadata-action (matches the deploy tag)"
        value: ${{ jobs.build.outputs.version }}
      tags:
        description: "Newline-separated full image:tag refs that were pushed"
        value: ${{ jobs.build.outputs.tags }}

concurrency:
  group: build-${{ inputs.image }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ inputs.image }}
          tags: ${{ inputs.tag_rules }}
          flavor: ${{ inputs.flavor }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        if: ${{ inputs.attest }}
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018  # v1
        with:
          subject-name: docker.io/${{ inputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
